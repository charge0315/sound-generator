<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gadget Concierge - Ultra Dashboard v3.0 Interactive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #38bdf8; --bg: #020617; }
        body {
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0, transparent 50%), radial-gradient(at 50% 0%, rgba(129, 140, 248, 0.1) 0, transparent 50%);
            background-attachment: fixed;
            color: #f1f5f9;
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
        }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.08); }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-6px); background: rgba(30, 41, 59, 0.8); border-color: var(--accent); box-shadow: 0 12px 40px -10px rgba(56, 189, 248, 0.3); }
        .sidebar { height: calc(100vh - 4rem); position: sticky; top: 2rem; }
        .input-glass { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.75rem; padding: 0.5rem 1rem; color: white; width: 100%; transition: all 0.2s; }
        .input-glass:focus { outline: none; border-color: var(--accent); background: rgba(255, 255, 255, 0.1); }
        .btn-primary { background: linear-gradient(90deg, #38bdf8, #818cf8); color: white; font-weight: bold; border-radius: 0.75rem; padding: 0.5rem 1.5rem; transition: transform 0.2s; }
        .btn-primary:active { transform: scale(0.95); }
    </style>
</head>
<body class="antialiased">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-80 p-6 hidden lg:block">
            <div class="sidebar glass rounded-3xl p-6 flex flex-col gap-8 overflow-y-auto">
                <div class="text-center">
                    <div class="w-16 h-16 bg-sky-500 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg shadow-sky-500/20">
                        <i class="fas fa-microchip text-2xl text-white"></i>
                    </div>
                    <h2 class="font-bold text-xl">GC Engine v3.0</h2>
                </div>

                <!-- Navigation -->
                <nav class="space-y-2">
                    <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-2 px-3">Sections</p>
                    <a href="#ai-dev" class="flex items-center gap-3 p-3 rounded-xl hover:bg-emerald-500/10 text-emerald-400"><i class="fas fa-robot"></i> AI & Software</a>
                    <a href="#pc-hw" class="flex items-center gap-3 p-3 rounded-xl hover:bg-sky-500/10 text-sky-400"><i class="fas fa-laptop-code"></i> PC Hardware</a>
                    <a href="#music" class="flex items-center gap-3 p-3 rounded-xl hover:bg-rose-500/10 text-rose-400"><i class="fas fa-guitar"></i> Music & Audio</a>
                </nav>

                <!-- Settings Panel -->
                <div class="mt-4 pt-6 border-t border-slate-800 space-y-6">
                    <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest px-3">Settings (学習)</p>
                    
                    <div>
                        <label class="text-xs text-slate-400 mb-2 block px-1">カテゴリを追加</label>
                        <div class="flex gap-2">
                            <input id="new-cat" type="text" placeholder="例: VR/AR" class="input-glass text-sm">
                            <button onclick="updateInterest('category', document.getElementById('new-cat').value)" class="btn-primary p-2 flex items-center justify-center"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>

                    <div>
                        <label class="text-xs text-slate-400 mb-2 block px-1">キーワード・ブランドを追加</label>
                        <select id="cat-select" class="input-glass text-xs mb-2">
                            <option value="AI・開発関連">AI & Software</option>
                            <option value="PC関連">PC Hardware</option>
                            <option value="音楽関連">Music & Audio</option>
                            <option value="ガジェット全般">Gadget全般</option>
                        </select>
                        <div class="flex gap-2">
                            <input id="new-key" type="text" placeholder="例: Minisforum" class="input-glass text-sm">
                            <button onclick="updateInterest('keyword', document.getElementById('new-key').value, document.getElementById('cat-select').value)" class="btn-primary p-2 flex items-center justify-center"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>

                    <div id="status-msg" class="text-[10px] text-center hidden p-2 rounded bg-emerald-500/20 text-emerald-400"></div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-grow p-4 md:p-8 lg:p-12 overflow-y-auto">
            <header class="flex flex-col md:flex-row md:items-end justify-between mb-12 gap-6">
                <div>
                    <h1 class="text-5xl font-black tracking-tighter mb-4 uppercase">Ultra <span class="text-sky-400">Dashboard</span></h1>
                    <p class="text-lg text-slate-400">最新ニュースを自律スクレイピング。Ryzen 9 7945HXのパワーで快適にブラウジング。🚀🎸</p>
                </div>
                <button onclick="fetchDashboard()" class="glass p-4 rounded-2xl text-sky-400 hover:bg-sky-500/10 transition-all">
                    <i class="fas fa-sync-alt mr-2"></i> 最新情報を取得
                </button>
            </header>

            <!-- Loading State -->
            <div id="loading" class="hidden flex flex-col items-center justify-center py-20 gap-4">
                <div class="w-12 h-12 border-4 border-sky-500/30 border-t-sky-500 rounded-full animate-spin"></div>
                <p class="text-slate-500 font-mono">Scraping latest news...</p>
            </div>

            <!-- AI Section -->
            <section id="ai-dev" class="mb-20 scroll-mt-24">
                <h2 class="text-2xl font-bold mb-8 flex items-center gap-3 text-emerald-400">🤖 AI & SOFTWARE</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-6" id="ai-container"></div>
            </section>

            <!-- PC Hardware Section -->
            <section id="pc-hw" class="mb-20 scroll-mt-24">
                <h2 class="text-2xl font-bold mb-8 flex items-center gap-3 text-sky-400">💻 PC HARDWARE</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-6" id="pc-container"></div>
            </section>

            <!-- Music Section -->
            <section id="music" class="mb-20 scroll-mt-24">
                <h2 class="text-2xl font-bold mb-8 flex items-center gap-3 text-rose-400">🎸 MUSIC & AUDIO</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-6" id="music-container"></div>
            </section>
        </main>
    </div>

    <script>
        async function updateInterest(type, value, name = '') {
            if (!value) return;
            const status = document.getElementById('status-msg');
            try {
                const res = await fetch('http://localhost:3005/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, value, name })
                });
                status.textContent = '興味を学習しました！リロードで反映されます。';
                status.classList.remove('hidden');
                setTimeout(() => status.classList.add('hidden'), 3000);
            } catch (err) {
                alert('APIサーバーを起動してください。');
            }
        }

        async function fetchDashboard() {
            const loading = document.getElementById('loading');
            loading.classList.remove('hidden');
            try {
                const res = await fetch('http://localhost:3005/dashboard');
                const data = await res.json();
                
                render('ai-container', data['AI・開発関連'] || []);
                render('pc-container', data['PC関連'] || []);
                render('music-container', data['音楽関連'] || []);
            } catch (e) {
                console.error('Fetch error:', e);
                alert('APIサーバー（Docker）を起動してください。');
            } finally {
                loading.classList.add('hidden');
            }
        }

        function render(containerId, items) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = items.map(item => `
                <div class="card glass rounded-2xl overflow-hidden flex flex-col h-full group">
                    <div class="relative h-44 overflow-hidden bg-slate-800">
                        <img src="${item.img}" class="w-full h-full object-cover opacity-70 group-hover:scale-110 transition-transform duration-500" onerror="this.src='https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=400'">
                        <div class="absolute top-3 left-3 px-2 py-1 bg-black/50 backdrop-blur rounded text-[10px] font-bold uppercase tracking-widest border border-white/10">${item.brand}</div>
                        <div class="absolute bottom-3 right-3 w-8 h-8 rounded-full flex items-center justify-center bg-sky-500/20 text-sky-400 text-[10px] font-bold border border-sky-500/30">${item.score}</div>
                    </div>
                    <div class="p-5 flex flex-col flex-grow">
                        <h3 class="font-bold text-sm mb-2 line-clamp-2">${item.title}</h3>
                        <p class="text-[11px] text-slate-400 mb-4 line-clamp-3">${item.desc}</p>
                        <div class="mt-auto pt-4 flex justify-between items-center border-t border-white/5">
                            <a href="${item.link}" target="_blank" class="text-[10px] font-bold uppercase tracking-wider text-sky-400 hover:text-sky-300">Read More →</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        fetchDashboard();
    </script>
</body>
</html>
